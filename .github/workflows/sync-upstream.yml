name: Sync Upstream

on:
  schedule:
    # Every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/virattt/ai-hedge-fund.git || true
          git fetch upstream

      - name: Merge upstream main
        run: |
          # Use merge instead of rebase to avoid conflicts from data/ commits.
          # On conflict, keep our version of data files (ours strategy),
          # but accept upstream changes for everything else.
          git merge upstream/main --no-edit \
            -X ours \
            || {
              echo "Merge conflict detected — auto-resolving with 'ours' for remaining files"
              git checkout --ours .
              git add .
              git commit --no-edit
            }

      - name: Push to origin
        run: |
          git push origin main
